; config/engine.ini
; overrides engine defaults; anything omitted keeps its registered default

[app]
maxFrames = 10          ; sandbox loops this many frames (dev-only)

[physics]
gravity = -12.0         ; default -9.81

[window]
width  = 1920           ; default 1280
height = 1080           ; default 720

[debug]
showProfiler = 1        ; 1 = on, 0 = off